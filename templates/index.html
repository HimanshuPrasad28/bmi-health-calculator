<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI & Health Calculator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.2)',
                        glassDark: 'rgba(0, 0, 0, 0.3)',
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-100 via-teal-100 to-gray-200 dark:from-gray-900 dark:via-blue-900 dark:to-gray-800 min-h-screen font-['Inter'] transition-colors duration-500 flex items-center justify-center p-4 text-gray-800 dark:text-gray-100">

    <!-- Main Container -->
    <main class="w-full max-w-4xl glass-card rounded-3xl p-6 md:p-8 shadow-2xl relative overflow-hidden">
        
        <!-- Top Section -->
        <header class="flex justify-between items-center mb-8 pb-4 border-b border-gray-200/50 dark:border-gray-700/50">
            <h1 class="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-teal-500 to-blue-600 dark:from-teal-400 dark:to-blue-400">
                <i class="fa-solid fa-heart-pulse mr-2 text-teal-500 dark:text-teal-400"></i>BMI & Health Calculator
            </h1>
            <div class="flex items-center gap-3 md:gap-4">
                <button id="darkModeToggle" class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-full hover:bg-white/40 dark:hover:bg-black/40 transition-all shadow-sm glass-btn">
                    <i class="fa-solid fa-moon text-lg md:text-xl" id="themeIcon"></i>
                </button>
                <button class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-full hover:bg-white/40 dark:hover:bg-black/40 transition-all shadow-sm glass-btn">
                    <i class="fa-solid fa-user text-lg md:text-xl"></i>
                </button>
            </div>
        </header>

        <!-- Form Section -->
        <form id="healthForm" class="space-y-6 md:space-y-8">
            <!-- Inputs in one horizontal row -->
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                
                <!-- Age -->
                <div class="flex flex-col">
                    <label class="text-sm font-medium mb-1.5 ml-1 opacity-80">Age</label>
                    <input type="number" id="age" required min="1" max="120" placeholder="e.g. 25"
                           class="glass-input w-full px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-teal-400 transition-all bg-white/40 dark:bg-black/20 placeholder-gray-500 dark:placeholder-gray-400 shadow-inner">
                </div>

                <!-- Gender -->
                <div class="flex flex-col">
                    <label class="text-sm font-medium mb-1.5 ml-1 opacity-80">Gender</label>
                    <div class="flex gap-2 h-[48px] md:h-[50px]">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="gender" value="male" class="peer hidden" checked>
                            <div class="h-full flex items-center justify-center gap-2 rounded-xl glass-btn peer-checked:bg-teal-500 peer-checked:text-white dark:peer-checked:bg-teal-500 transition-all border border-transparent shadow-sm">
                                <i class="fa-solid fa-mars"></i> <span class="text-sm md:text-base hidden sm:inline">Male</span>
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="gender" value="female" class="peer hidden">
                            <div class="h-full flex items-center justify-center gap-2 rounded-xl glass-btn peer-checked:bg-pink-500 peer-checked:text-white dark:peer-checked:bg-pink-500 transition-all border border-transparent shadow-sm">
                                <i class="fa-solid fa-venus"></i> <span class="text-sm md:text-base hidden sm:inline">Female</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Height -->
                <div class="flex flex-col">
                    <label class="text-sm font-medium mb-1.5 ml-1 opacity-80">Height (cm)</label>
                    <input type="number" id="height" required min="50" max="250" step="0.1" placeholder="e.g. 175"
                           class="glass-input w-full px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-teal-400 transition-all bg-white/40 dark:bg-black/20 placeholder-gray-500 dark:placeholder-gray-400 shadow-inner">
                </div>

                <!-- Weight -->
                <div class="flex flex-col">
                    <label class="text-sm font-medium mb-1.5 ml-1 opacity-80">Weight (kg)</label>
                    <input type="number" id="weight" required min="20" max="300" step="0.1" placeholder="e.g. 70"
                           class="glass-input w-full px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-teal-400 transition-all bg-white/40 dark:bg-black/20 placeholder-gray-500 dark:placeholder-gray-400 shadow-inner">
                </div>

            </div>

            <!-- Activity Level & Button Row -->
            <div class="flex flex-col md:flex-row gap-4 md:gap-6 items-end">
                <div class="flex-1 flex flex-col w-full">
                    <label class="text-sm font-medium mb-1.5 ml-1 opacity-80">Activity Level</label>
                    <div class="relative">
                        <select id="activity" required
                                class="glass-input w-full px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-teal-400 transition-all bg-white/40 dark:bg-black/20 shadow-inner appearance-none cursor-pointer">
                            <option value="sedentary">Sedentary (Little or no exercise)</option>
                            <option value="lightly_active">Lightly Active (Exercise 1-3 days/week)</option>
                            <option value="moderately_active">Moderately Active (Exercise 3-5 days/week)</option>
                            <option value="very_active">Very Active (Exercise 6-7 days/week)</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-50"></i>
                    </div>
                </div>

                <div class="flex-1 w-full mt-2 md:mt-0">
                    <button type="submit" class="w-full h-[52px] rounded-xl bg-gradient-to-r from-green-400 to-teal-500 hover:from-green-500 hover:to-teal-600 focus:ring-4 focus:ring-teal-300 dark:focus:ring-teal-800 text-white font-bold text-lg shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-2">
                        <span>Calculate Health</span>
                        <i class="fa-solid fa-calculator"></i>
                    </button>
                </div>
            </div>
        </form>

        <!-- Divider -->
        <div id="resultsDivider" class="hidden w-full h-px bg-gray-300/50 dark:bg-gray-700/50 my-8"></div>

        <!-- Results Section (Hidden initially) -->
        <section id="resultsSection" class="hidden animate-fade-in-up">
            <h2 class="text-2xl font-bold mb-6 opacity-90"><i class="fa-solid fa-chart-pie mr-2 text-blue-500"></i>Dashboard Results</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                
                <!-- 1. BMI Progress Bar Card -->
                <div class="glass-card-inner rounded-2xl p-6 shadow-md md:col-span-2 lg:col-span-3 flex flex-col justify-center relative overflow-hidden group">
                    <div class="absolute -right-20 -top-20 w-48 h-48 bg-blue-400/10 rounded-full blur-3xl group-hover:bg-blue-400/20 transition-all duration-500"></div>
                    <div class="flex justify-between items-end mb-8 relative z-10">
                        <div>
                            <h3 class="text-sm uppercase tracking-wider font-semibold opacity-60 mb-1">BMI Progress</h3>
                            <div class="flex items-center gap-4">
                                <span id="bmiValue" class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-teal-500 to-blue-500">0.0</span>
                                <span id="bmiCategory" class="text-lg font-medium px-4 py-1.5 rounded-full text-sm shadow-sm transition-colors duration-500">Category</span>
                            </div>
                        </div>
                    </div>

                    <!-- BMI Progress Bar -->
                    <div class="w-full relative z-10">
                        <div class="relative w-full h-8 rounded-full overflow-hidden flex shadow-inner border border-white/20 dark:border-black/20">
                            <!-- Using fixed colors that look good in both modes -->
                            <div class="h-full w-[25%] bg-[#60A5FA] flex items-center justify-center text-xs text-black/60 dark:text-white/80 font-medium tracking-wide">Underweight</div>
                            <div class="h-full w-[25%] bg-[#34D399] flex items-center justify-center text-xs text-black/60 dark:text-white/80 font-medium tracking-wide">Normal</div>
                            <div class="h-full w-[25%] bg-[#FBBF24] flex items-center justify-center text-xs text-black/60 dark:text-white/80 font-medium tracking-wide">Overweight</div>
                            <div class="h-full w-[25%] bg-[#F87171] flex items-center justify-center text-xs text-black/60 dark:text-white/80 font-medium tracking-wide">Obese</div>
                        </div>
                        <!-- Marker -->
                        <div class="relative w-full -mt-10 h-12 pointer-events-none">
                            <div id="bmiIndicator" class="absolute top-0 bottom-0 w-1 bg-gray-900 dark:bg-white shadow-[0_0_10px_rgba(0,0,0,0.5)] transition-all duration-1000 ease-out z-20 flex flex-col items-center justify-center" style="left: 0%;">
                                <div class="w-5 h-5 rounded-full bg-white dark:bg-gray-800 shadow-md border-[3px] border-gray-900 dark:border-white absolute -top-1"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. Daily Calorie Card -->
                <div class="glass-card-inner rounded-2xl p-6 shadow-md flex items-center gap-5 relative overflow-hidden group hover:-translate-y-1 transition-transform cursor-default">
                    <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-orange-300 to-red-400 text-white flex items-center justify-center shadow-md">
                        <i class="fa-solid fa-fire text-2xl group-hover:scale-125 transition-transform duration-300"></i>
                    </div>
                    <div class="relative z-10">
                        <h3 class="text-sm font-semibold opacity-70 mb-1">Daily Calorie Needs</h3>
                        <p class="text-3xl font-bold"><span id="dailyCalories">0</span> <span class="text-base font-normal opacity-70">kcal</span></p>
                    </div>
                    <div class="absolute -right-4 -bottom-4 text-orange-500/10 dark:text-orange-900/40 text-7xl transform -rotate-12 group-hover:rotate-0 transition-transform duration-500"><i class="fa-solid fa-fire"></i></div>
                </div>

                <!-- 3. BMR Card -->
                <div class="glass-card-inner rounded-2xl p-6 shadow-md flex items-center gap-5 relative overflow-hidden group hover:-translate-y-1 transition-transform cursor-default">
                    <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-300 to-purple-400 text-white flex items-center justify-center shadow-md">
                        <i class="fa-solid fa-bolt text-2xl group-hover:scale-125 transition-transform duration-300"></i>
                    </div>
                    <div class="relative z-10">
                        <h3 class="text-sm font-semibold opacity-70 mb-1">BMR</h3>
                        <p class="text-3xl font-bold"><span id="bmrValue">0</span> <span class="text-base font-normal opacity-70">kcal</span></p>
                    </div>
                    <div class="absolute -right-4 -bottom-4 text-indigo-500/10 dark:text-indigo-900/40 text-7xl transform rotate-12 group-hover:rotate-0 transition-transform duration-500"><i class="fa-solid fa-bolt"></i></div>
                </div>

                <!-- 4. Health Insights Card -->
                <div class="glass-card-inner rounded-2xl p-6 shadow-md md:col-span-2 lg:col-span-1 relative overflow-hidden group border-l-[6px] border-pink-400 dark:border-pink-500 hover:-translate-y-1 transition-transform">
                    <div class="flex items-center gap-3 mb-3 relative z-10">
                        <div class="p-2 rounded-xl bg-pink-100 text-pink-600 dark:bg-pink-900/60 dark:text-pink-300 shadow-sm">
                            <i class="fa-solid fa-heart-circle-check text-lg group-hover:animate-pulse"></i>
                        </div>
                        <h3 class="text-lg font-semibold opacity-90">Health Insights</h3>
                    </div>
                    <p id="insightsText" class="text-sm opacity-80 leading-relaxed relative z-10 font-medium">
                        Enter your details to generate personalized health insights based on your body metrics.
                    </p>
                    <div class="absolute -right-8 -bottom-8 text-pink-500/10 dark:text-pink-900/40 text-8xl group-hover:scale-110 transition-transform duration-700"><i class="fa-solid fa-heart"></i></div>
                </div>

            </div>
        </section>

    </main>

    <!-- Modal overlay if needed (omitted for now) -->

    <!-- Custom Logic -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
